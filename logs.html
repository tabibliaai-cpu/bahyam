<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bahyam - Logs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
</head>
<body>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">B</div>
            <div class="sidebar-brand">Bahyam<span>API Monitor</span></div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section">Monitoring</div>
            <a href="index.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="endpoints.html" class="nav-item"><i class="fa-solid fa-server"></i> Endpoints <span class="nav-badge">8</span></a>
            <a href="logs.html" class="nav-item active"><i class="fa-solid fa-scroll"></i> Logs</a>
            <a href="alerts.html" class="nav-item"><i class="fa-solid fa-bell"></i> Alerts <span class="nav-badge" id="navAlertBadge">3</span></a>
            <div class="nav-section">System</div>
            <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-avatar">A</div>
            <div class="sidebar-user"><div class="sidebar-user-name">Admin</div><div class="sidebar-user-role">Administrator</div></div>
        </div>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <div class="page-header-left">
                <button id="menuToggle" class="menu-toggle"><i class="fa-solid fa-bars"></i></button>
                <div>
                    <div class="page-title">Request Logs</div>
                    <div class="page-subtitle" id="logCount">Loading...</div>
                </div>
            </div>
            <div class="page-header-right">
                <button class="header-btn" id="clearLogs">
                    <i class="fa-solid fa-trash"></i> <span>Clear</span>
                </button>
                <button class="header-btn primary" id="refreshLogs">
                    <i class="fa-solid fa-rotate"></i> <span>Refresh</span>
                </button>
            </div>
        </header>

        <div class="page-body">
            <div class="table-card">
                <div class="table-card-header">
                    <div class="filter-bar">
                        <span class="filter-chip active" data-log-filter="all">All</span>
                        <span class="filter-chip" data-log-filter="2xx" style="color:var(--success);">2xx Success</span>
                        <span class="filter-chip" data-log-filter="4xx" style="color:var(--warning);">4xx Client Error</span>
                        <span class="filter-chip" data-log-filter="5xx" style="color:var(--danger);">5xx Server Error</span>
                    </div>
                    <div class="table-search">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="logSearch" placeholder="Search logs...">
                    </div>
                </div>
                <!-- Table Header -->
                <div style="overflow-x:auto;">
                    <div class="log-entry" style="background:var(--bg-input);border-bottom:1px solid var(--border-color);font-weight:600;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);">
                        <span>Time</span>
                        <span>Method</span>
                        <span>URL</span>
                        <span>Status</span>
                        <span>Latency</span>
                        <span>User Agent</span>
                    </div>
                    <div id="logsContainer"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/logs.js"></script>
</body>
</html>
