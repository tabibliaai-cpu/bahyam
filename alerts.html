<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bahyam - Alerts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
</head>
<body>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">B</div>
            <div class="sidebar-brand">Bahyam<span>API Monitor</span></div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section">Monitoring</div>
            <a href="index.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="endpoints.html" class="nav-item"><i class="fa-solid fa-server"></i> Endpoints <span class="nav-badge">8</span></a>
            <a href="logs.html" class="nav-item"><i class="fa-solid fa-scroll"></i> Logs</a>
            <a href="alerts.html" class="nav-item active"><i class="fa-solid fa-bell"></i> Alerts <span class="nav-badge" id="navAlertBadge">3</span></a>
            <div class="nav-section">System</div>
            <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-avatar">A</div>
            <div class="sidebar-user"><div class="sidebar-user-name">Admin</div><div class="sidebar-user-role">Administrator</div></div>
        </div>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <div class="page-header-left">
                <button id="menuToggle" class="menu-toggle"><i class="fa-solid fa-bars"></i></button>
                <div>
                    <div class="page-title">Alerts</div>
                    <div class="page-subtitle">Monitor and manage system alerts</div>
                </div>
            </div>
        </header>

        <div class="page-body">
            <!-- Alert Tabs -->
            <div style="display:flex;gap:8px;margin-bottom:20px;">
                <button class="filter-chip active" data-alert-tab="active">
                    <i class="fa-solid fa-bell" style="margin-right:4px;"></i> Active (<span id="activeAlertCount">0</span>)
                </button>
                <button class="filter-chip" data-alert-tab="resolved">
                    <i class="fa-solid fa-circle-check" style="margin-right:4px;"></i> Resolved (<span id="resolvedAlertCount">0</span>)
                </button>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                <!-- Alert List -->
                <div class="chart-card">
                    <div class="chart-card-header">
                        <div class="chart-card-title">Alert History</div>
                    </div>
                    <div class="alert-list" id="alertsList" style="max-height:600px;overflow-y:auto;"></div>
                </div>

                <!-- Alert Rules -->
                <div class="chart-card">
                    <div class="chart-card-header">
                        <div class="chart-card-title">Alert Rules</div>
                    </div>
                    <div id="alertRulesList"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/alerts.js"></script>
</body>
</html>
